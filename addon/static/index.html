<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GitHub Copilot — Home Assistant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #0d1117; overflow: hidden; }
    #terminal { width: 100%; height: 100%; }
    #status-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      background: #161b22; border-bottom: 1px solid #30363d;
      font: 12px/28px 'SF Mono', Consolas, monospace;
      color: #8b949e; padding: 0 12px;
      display: flex; align-items: center; gap: 10px;
    }
    #status-bar .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3fb950; flex-shrink: 0;
    }
    #status-bar .dot.offline { background: #da3633; }
    #terminal-wrap {
      position: absolute; top: 29px; left: 0; right: 0; bottom: 0;
    }
    .xterm { padding: 4px 8px; }
  </style>
</head>
<body>
<div id="status-bar">
  <span class="dot offline" id="conn-dot"></span>
  <span id="conn-label">Connecting…</span>
</div>
<div id="terminal-wrap">
  <div id="terminal"></div>
</div>

<script>
(function () {
  const dot   = document.getElementById("conn-dot");
  const label = document.getElementById("conn-label");

  function setStatus(online, text) {
    dot.className   = "dot" + (online ? "" : " offline");
    label.textContent = text;
  }

  /* ── xterm.js ── */
  const term = new Terminal({
    theme: {
      background: "#0d1117", foreground: "#c9d1d9",
      cursor: "#58a6ff", selection: "rgba(88,166,255,0.25)",
      black: "#0d1117", red: "#ff7b72", green: "#3fb950",
      yellow: "#d29922", blue: "#58a6ff", magenta: "#bc8cff",
      cyan: "#39c5cf", white: "#b1bac4",
      brightBlack: "#6e7681", brightRed: "#ffa198",
      brightGreen: "#56d364", brightYellow: "#e3b341",
      brightBlue: "#79c0ff", brightMagenta: "#d2a8ff",
      brightCyan: "#56d4dd", brightWhite: "#f0f6fc",
    },
    fontFamily: "'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace",
    fontSize: 14, lineHeight: 1.4,
    cursorBlink: true, scrollback: 5000,
    allowProposedApi: true,
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById("terminal"));
  fitAddon.fit();

  /* ── WebSocket ── */
  const base = window.location.href.replace(/\/$/, "");
  const wsBase = base.replace(/^http/, "ws");
  let ws, heartbeatTimer, reconnectTimer, reconnectDelay = 1000;

  function connect() {
    clearTimeout(reconnectTimer);
    setStatus(false, "Connecting…");

    ws = new WebSocket(wsBase + "/ws");
    ws.binaryType = "arraybuffer";

    ws.onopen = () => {
      setStatus(true, "GitHub Copilot CLI");
      reconnectDelay = 1000;
      sendResize();
      heartbeatTimer = setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) ws.send(new Uint8Array([0]));
      }, 30000);
    };

    ws.onmessage = (ev) => {
      const data = ev.data instanceof ArrayBuffer
        ? new Uint8Array(ev.data) : new TextEncoder().encode(ev.data);
      term.write(data);
    };

    ws.onclose = ws.onerror = () => {
      clearInterval(heartbeatTimer);
      setStatus(false, "Reconnecting…");
      reconnectDelay = Math.min(reconnectDelay * 2, 15000);
      reconnectTimer = setTimeout(connect, reconnectDelay);
    };
  }

  /* User keystrokes → WebSocket */
  term.onData(data => {
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(new TextEncoder().encode(data));
  });

  /* Resize → WebSocket (0x01 + big-endian uint16 rows + uint16 cols) */
  function sendResize() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const buf = new Uint8Array(5);
    buf[0] = 0x01;
    const v = new DataView(buf.buffer);
    v.setUint16(1, term.rows,  false);
    v.setUint16(3, term.cols, false);
    ws.send(buf);
  }

  const ro = new ResizeObserver(() => { fitAddon.fit(); sendResize(); });
  ro.observe(document.getElementById("terminal-wrap"));
  window.addEventListener("resize", () => { fitAddon.fit(); sendResize(); });

  connect();
})();
</script>
</body>
</html>
