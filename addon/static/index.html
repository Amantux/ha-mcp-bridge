<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot Chat — HA MCP Bridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111318;
      --surface: #1c1f27;
      --surface2: #252832;
      --border: #2e3140;
      --text: #e8eaf0;
      --text-dim: #8a8fa8;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --user-bg: #1f4068;
      --user-text: #cfe2ff;
      --error: #ff6b6b;
      --success: #4caf82;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 15px; font-weight: 600; flex: 1; }
    #auth-badge {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      white-space: nowrap;
    }
    #auth-badge.signed-in { border-color: var(--success); color: var(--success); }
    #auth-badge.signed-out { border-color: var(--accent); color: var(--accent); }

    /* ── Auth gate ── */
    #auth-gate {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    #auth-gate.visible { display: flex; }
    #auth-gate h2 { font-size: 18px; }
    #auth-gate p { color: var(--text-dim); max-width: 400px; line-height: 1.6; }

    .code-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 24px;
      text-align: center;
    }
    .code-box .label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
    .code-box .code {
      font-family: monospace;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--accent);
    }
    .code-box .url { font-size: 12px; color: var(--text-dim); margin-top: 8px; }
    .code-box .url a { color: var(--accent); text-decoration: none; }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .spinner.visible { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Chat thread ── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      gap: 4px;
    }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 3px;
    }
    .msg.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }
    .msg.error .bubble {
      background: transparent;
      border: 1px solid var(--error);
      color: var(--error);
      border-radius: var(--radius);
    }

    /* Code blocks inside assistant replies */
    .bubble code {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      background: var(--surface2);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .bubble pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin-top: 6px;
    }
    .bubble pre code { background: none; padding: 0; }

    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 14px;
    }
    .dot {
      width: 6px; height: 6px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* ── Input row ── */
    #input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
      outline: none;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--text-dim); }

    #send-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      align-self: flex-end;
      transition: background 0.15s;
    }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    /* ── Buttons ── */
    .btn {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
               0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
               -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
               .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
               0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
               0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27
               1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15
               0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
               0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8
               c0-4.42-3.58-8-8-8z"/>
    </svg>
    <h1>Copilot Chat</h1>
    <button id="auth-badge" class="signed-out" onclick="toggleAuthPanel()">Sign in</button>
  </header>

  <!-- Auth gate (shown when not authenticated) -->
  <div id="auth-gate">
    <svg width="48" height="48" viewBox="0 0 16 16" fill="#58a6ff" aria-hidden="true">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
               0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
               -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
               .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
               0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
               0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27
               1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15
               0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
               0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8
               c0-4.42-3.58-8-8-8z"/>
    </svg>
    <h2>Connect GitHub Copilot</h2>
    <p>Sign in with your GitHub account to start chatting. You need a GitHub Copilot subscription.</p>
    <button class="btn btn-primary" onclick="startAuth()">Sign in with GitHub</button>

    <!-- Device flow code (shown after clicking Sign in) -->
    <div id="device-box" style="display:none">
      <div class="code-box">
        <div class="label">Enter this code at</div>
        <div class="code" id="user-code">------</div>
        <div class="url"><a id="verify-link" href="#" target="_blank" rel="noopener">github.com/login/device</a></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:8px;color:var(--text-dim);font-size:13px;">
        <div class="spinner visible" id="poll-spinner"></div>
        Waiting for you to approve…
      </div>
      <button class="btn btn-ghost" onclick="cancelAuth()" style="margin-top:4px">Cancel</button>
    </div>
    <div id="auth-error" style="color:var(--error);font-size:13px;display:none"></div>
  </div>

  <!-- Chat thread -->
  <div id="chat-area"></div>

  <!-- Input row -->
  <div id="input-row">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Ask Copilot about your Home Assistant…"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M.5 1.163A1 1 0 0 1 1.97.28l12.868 6.837a1 1 0 0 1 0 1.766L1.969 15.72A1
                 1 0 0 1 .5 14.836V10.33a1 1 0 0 1 .816-.983L8.5 8 1.316 6.653A1 1 0 0
                 1 .5 5.67V1.163Z"/>
      </svg>
    </button>
  </div>

</div>

<script>
// ---------------------------------------------------------------------------
// API base — works under both direct access and HA ingress proxy.
// Under ingress the page URL is: https://ha.local/api/hassio_ingress/TOKEN/
// window.location.origin + stripped pathname gives the correct prefix so that
// apiUrl('chat') → https://ha.local/api/hassio_ingress/TOKEN/chat
// ---------------------------------------------------------------------------
const BASE = window.location.origin +
             window.location.pathname.replace(/\/[^/]*$/, '');

function apiUrl(path) {
  return BASE + '/' + path;
}

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let messages = [];           // [{role, content}] sent to /chat
let authenticated = false;
let pollTimer = null;
let currentDeviceCode = null;

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
window.addEventListener('load', async () => {
  await checkAuth();
});

async function checkAuth() {
  try {
    const r = await fetch(apiUrl('auth/status'));
    const d = await r.json();
    setAuthenticated(d.authenticated, d.username);
  } catch {
    setAuthenticated(false, null);
  }
}

function setAuthenticated(auth, username) {
  authenticated = auth;
  const badge = document.getElementById('auth-badge');
  const gate  = document.getElementById('auth-gate');
  const chat  = document.getElementById('chat-area');
  const input = document.getElementById('input-row');

  if (auth) {
    badge.textContent = username ? `@${username}` : 'Signed in';
    badge.className = 'signed-in';
    gate.classList.remove('visible');
    chat.style.display = '';
    input.style.display = '';
    if (messages.length === 0) addWelcome(username);
  } else {
    badge.textContent = 'Sign in';
    badge.className = 'signed-out';
    gate.classList.add('visible');
    chat.style.display = 'none';
    input.style.display = 'none';
  }
}

function toggleAuthPanel() {
  if (authenticated) {
    // Offer sign-out
    if (confirm('Sign out from GitHub Copilot?')) signOut();
  } else {
    document.getElementById('auth-gate').classList.toggle('visible');
  }
}

async function signOut() {
  await fetch(apiUrl('auth/revoke'), { method: 'POST' });
  setAuthenticated(false, null);
}

// ---------------------------------------------------------------------------
// Device flow auth
// ---------------------------------------------------------------------------
async function startAuth() {
  document.getElementById('auth-error').style.display = 'none';
  try {
    const r = await fetch(apiUrl('auth/device'), { method: 'POST' });
    const d = await r.json();
    if (d.error) throw new Error(d.error);

    currentDeviceCode = d.device_code;
    document.getElementById('user-code').textContent = d.user_code;
    const link = document.getElementById('verify-link');
    link.href = d.verification_uri;
    link.textContent = d.verification_uri.replace('https://', '');
    document.getElementById('device-box').style.display = 'flex';
    document.getElementById('device-box').style.flexDirection = 'column';
    document.getElementById('device-box').style.alignItems = 'center';
    document.getElementById('device-box').style.gap = '12px';
    document.querySelector('#auth-gate .btn-primary').style.display = 'none';

    // Open the verification URL automatically
    window.open(d.verification_uri, '_blank');

    // Start polling
    const interval = (d.interval || 5) * 1000;
    pollTimer = setInterval(() => pollAuth(d.device_code), interval);
  } catch (e) {
    showAuthError(e.message);
  }
}

async function pollAuth(deviceCode) {
  try {
    const r = await fetch(apiUrl('auth/poll'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device_code: deviceCode }),
    });
    const d = await r.json();
    if (d.success) {
      clearInterval(pollTimer);
      document.getElementById('device-box').style.display = 'none';
      document.querySelector('#auth-gate .btn-primary').style.display = '';
      await checkAuth();
    } else if (d.error) {
      clearInterval(pollTimer);
      showAuthError(d.error);
      document.querySelector('#auth-gate .btn-primary').style.display = '';
    }
  } catch { /* retry next tick */ }
}

function cancelAuth() {
  clearInterval(pollTimer);
  document.getElementById('device-box').style.display = 'none';
  document.querySelector('#auth-gate .btn-primary').style.display = '';
  currentDeviceCode = null;
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ---------------------------------------------------------------------------
// Chat
// ---------------------------------------------------------------------------
function addWelcome(username) {
  const name = username ? ` @${username}` : '';
  appendMessage('assistant',
    `Hi${name}! I'm GitHub Copilot connected to your Home Assistant. ` +
    `Ask me anything about your automations, entities, or how to get things done in HA.`
  );
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || !authenticated) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendMessage('user', text);
  messages.push({ role: 'user', content: text });

  const typingEl = appendTyping();

  try {
    const r = await fetch(apiUrl('chat'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
    });
    const d = await r.json();
    typingEl.remove();

    if (d.error) {
      appendMessage('error', d.error);
    } else {
      const reply = d.response || '(no response)';
      messages.push({ role: 'assistant', content: reply });
      // Keep history to last 20 messages (10 turns)
      if (messages.length > 20) messages = messages.slice(-20);
      appendMessage('assistant', reply);
    }
  } catch (e) {
    typingEl.remove();
    appendMessage('error', 'Network error: ' + e.message);
  }

  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function appendMessage(role, content) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  // Render simple markdown: code blocks and inline code
  bubble.innerHTML = renderMarkdown(content);
  div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function appendTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

// Minimal markdown renderer: fenced code blocks + inline code + newlines
function renderMarkdown(text) {
  // Escape HTML first
  let s = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Fenced code blocks ```lang\n...\n```
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trimEnd()}</code></pre>`
  );

  // Inline code `...`
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold **...**
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Newlines → <br> (outside pre blocks — simple approximation)
  s = s.replace(/\n(?!<\/code>)/g, '<br>');

  return s;
}
</script>
</body>
</html>
