<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot Terminal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --text: #c9d1d9;
      --dim: #6e7681;
      --green: #3fb950;
      --blue: #58a6ff;
      --yellow: #d29922;
      --red: #f85149;
      --prompt: #58a6ff;
      --cursor: #c9d1d9;
      --font: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.6; overflow: hidden; }
    #terminal { display: flex; flex-direction: column; height: 100vh; }

    /* ── output ── */
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px 4px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    .line-out  { color: var(--text); }
    .line-err  { color: var(--red); }
    .line-info { color: var(--dim); }
    .line-ok   { color: var(--green); }
    .line-prompt { color: var(--prompt); }
    .line-user { color: var(--yellow); }

    /* ── input row ── */
    #input-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px 10px;
      border-top: 1px solid #21262d;
      flex-shrink: 0;
    }
    #ps1 { color: var(--prompt); white-space: nowrap; user-select: none; }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      caret-color: var(--cursor);
    }
    #input::placeholder { color: var(--dim); }

    /* ── auth banner ── */
    #auth-banner {
      background: #161b22;
      border-bottom: 1px solid #21262d;
      padding: 10px 14px;
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    #auth-banner.visible { display: flex; }
    #auth-code { font-size: 22px; letter-spacing: 4px; color: var(--blue); font-weight: 700; }
    #auth-url  { color: var(--dim); font-size: 11px; }
    #auth-url a { color: var(--blue); text-decoration: none; }
    .auth-row  { display: flex; align-items: center; gap: 10px; }
    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── spinner ── */
    .spin {
      display: inline-block;
      width: 10px; height: 10px;
      border: 1px solid var(--dim);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="terminal">

  <!-- Auth banner (shown when device flow is pending) -->
  <div id="auth-banner">
    <div class="auth-row">
      <span class="spin" id="auth-spin" style="display:none"></span>
      <span style="color:var(--yellow)">▸ GitHub auth required</span>
    </div>
    <div>Open <span id="auth-url"><a id="auth-link" href="https://github.com/login/device" target="_blank" rel="noopener">github.com/login/device</a></span> and enter:</div>
    <div id="auth-code">------</div>
    <div style="color:var(--dim);font-size:11px" id="auth-waiting">Waiting for browser approval<span class="blink">_</span></div>
  </div>

  <!-- Terminal output -->
  <div id="output"></div>

  <!-- Input row -->
  <div id="input-row">
    <span id="ps1">copilot&gt;</span>
    <input
      id="input"
      type="text"
      placeholder="ask anything about your Home Assistant…"
      autocomplete="off"
      spellcheck="false"
      autofocus
    />
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Base URL — works under both direct access and HA ingress proxy
// ---------------------------------------------------------------------------
const BASE = window.location.origin +
             window.location.pathname.replace(/\/[^/]*$/, '');
const api = (path) => BASE + '/' + path;

// ---------------------------------------------------------------------------
// Terminal output helpers
// ---------------------------------------------------------------------------
const out = document.getElementById('output');

function writeLine(text, cls = 'line-out') {
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = text;
  out.appendChild(div);
  out.scrollTop = out.scrollHeight;
}

function writeLines(text, cls) {
  text.split('\n').forEach(l => { if (l !== '') writeLine(l, cls); });
}

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let busy = false;
let authPolling = null;

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
window.addEventListener('load', async () => {
  writeLine('HA MCP Bridge — GitHub Copilot terminal', 'line-info');
  writeLine('Type a prompt and press Enter. Type "auth" to sign in to GitHub.', 'line-info');
  writeLine('', 'line-info');
  await checkAuth(true);
  document.getElementById('input').focus();
});

async function checkAuth(quiet = false) {
  try {
    const r = await fetch(api('auth/status'));
    const d = await r.json();
    if (d.authenticated) {
      document.getElementById('ps1').textContent = (d.username ? `@${d.username}` : 'copilot') + '>';
      if (!quiet) writeLine(`✓ Signed in as @${d.username || '?'}`, 'line-ok');
      return true;
    } else {
      document.getElementById('ps1').textContent = 'copilot>';
      if (!quiet) writeLine('✗ Not signed in. Type "auth" to authenticate.', 'line-err');
      return false;
    }
  } catch (e) {
    writeLine('Error checking auth: ' + e.message, 'line-err');
    return false;
  }
}

// ---------------------------------------------------------------------------
// Auth flow
// ---------------------------------------------------------------------------
async function startAuth() {
  writeLine('Starting GitHub auth…', 'line-info');
  setBusy(true);
  try {
    const r = await fetch(api('auth/start'), { method: 'POST' });
    const d = await r.json();
    if (d.error) { writeLine('Auth error: ' + d.error, 'line-err'); setBusy(false); return; }

    const code = d.code || '------';
    const url  = d.url  || 'https://github.com/login/device';

    document.getElementById('auth-code').textContent = code;
    document.getElementById('auth-link').href = url;
    document.getElementById('auth-link').textContent = url.replace('https://', '');
    document.getElementById('auth-banner').classList.add('visible');
    document.getElementById('auth-spin').style.display = 'inline-block';

    writeLine(`→ Visit ${url}`, 'line-info');
    writeLine(`→ Enter code: ${code}`, 'line-info');
    window.open(url, '_blank');

    // Poll for completion
    authPolling = setInterval(async () => {
      try {
        const pr = await fetch(api('auth/poll'), { method: 'POST' });
        const pd = await pr.json();
        if (pd.done) {
          clearInterval(authPolling);
          authPolling = null;
          document.getElementById('auth-banner').classList.remove('visible');
          setBusy(false);
          if (pd.authenticated) {
            writeLine(`✓ Signed in as @${pd.username || '?'}`, 'line-ok');
            document.getElementById('ps1').textContent = (pd.username ? `@${pd.username}` : 'copilot') + '>';
          } else {
            writeLine('Auth did not complete — try "auth" again.', 'line-err');
          }
        }
      } catch { /* retry */ }
    }, 2000);
  } catch (e) {
    writeLine('Auth failed: ' + e.message, 'line-err');
    setBusy(false);
  }
}

// ---------------------------------------------------------------------------
// Input handling
// ---------------------------------------------------------------------------
document.getElementById('input').addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text || busy) return;
  inp.value = '';

  // Echo the input
  writeLine(`${document.getElementById('ps1').textContent} ${text}`, 'line-user');

  // Built-in commands
  if (text === 'auth' || text === 'login') { await startAuth(); return; }
  if (text === 'status') { await checkAuth(false); return; }
  if (text === 'clear') { out.innerHTML = ''; return; }
  if (text === 'help') {
    writeLine('Commands:', 'line-info');
    writeLine('  auth    — sign in to GitHub', 'line-info');
    writeLine('  status  — check auth status', 'line-info');
    writeLine('  clear   — clear terminal', 'line-info');
    writeLine('  <anything else> — ask GitHub Copilot', 'line-info');
    return;
  }

  // Send to Copilot
  setBusy(true);
  const spinner = writeLine('…', 'line-info');
  try {
    const r = await fetch(api('chat'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text }),
    });
    const d = await r.json();
    spinner.remove();
    if (d.error) {
      writeLines(d.error, 'line-err');
    } else {
      writeLines(d.output || '(no output)', 'line-out');
    }
  } catch (err) {
    spinner.remove();
    writeLine('Network error: ' + err.message, 'line-err');
  }
  setBusy(false);
  writeLine('', 'line-info');
  document.getElementById('input').focus();
});

function setBusy(b) {
  busy = b;
  document.getElementById('input').disabled = b;
  if (!b) document.getElementById('input').focus();
}

// Re-focus input when clicking anywhere in the terminal
document.getElementById('output').addEventListener('click', () => {
  if (!busy) document.getElementById('input').focus();
});
</script>
</body>
</html>
