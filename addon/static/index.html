<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GitHub Copilot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      background: #0d1117; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px; height: 46px;
      background: #161b22; border-bottom: 1px solid #30363d;
    }
    .logo { width: 22px; height: 22px; }
    header h1 { font-size: 14px; font-weight: 600; color: #e6edf3; }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3fb950; margin-left: auto;
      transition: background 0.3s;
    }
    #status-dot.unauthenticated { background: #f85149; }
    #status-dot.connecting { background: #d29922; }
    #status-label { font-size: 12px; color: #8b949e; }

    /* ── Terminal ── */
    #terminal-container {
      flex: 1; overflow: hidden; padding: 4px;
      background: #0d1117;
    }
    .xterm { height: 100%; }
    .xterm-viewport { background: #0d1117 !important; }

    /* ── Auth notice banner ── */
    #auth-banner {
      display: none;
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: #1c2128; border: 1px solid #388bfd; border-radius: 8px;
      padding: 10px 16px; font-size: 13px; color: #e6edf3;
      box-shadow: 0 4px 16px rgba(0,0,0,.5); z-index: 100; max-width: 480px;
      text-align: center;
    }
    #auth-banner a { color: #58a6ff; }
    #auth-banner button {
      margin-left: 12px; padding: 4px 12px; border: none; border-radius: 6px;
      background: #238636; color: #fff; cursor: pointer; font-size: 12px;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <svg class="logo" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 2C6.477 2 2 6.477 2 12c0 5.523 4.477 10 10 10s10-4.477 10-10C22 6.477 17.523 2 12 2Z"
            fill="#238636"/>
      <path d="M9.5 9a2.5 2.5 0 0 0 0 5h5a2.5 2.5 0 0 0 0-5h-5Z" fill="#fff"/>
    </svg>
    <h1>GitHub Copilot</h1>
    <span id="status-label">connecting…</span>
    <span id="status-dot connecting"></span>
  </header>
  <div id="terminal-container"></div>
</div>

<div id="auth-banner">
  Not signed in. Type <code>/login</code> in the terminal, or
  <a href="#" id="auth-link">sign in via GitHub</a>.
  <button onclick="dismissBanner()">✕</button>
</div>

<script>
(function () {
  // ── Terminal init ────────────────────────────────────────────────
  const term = new Terminal({
    theme: {
      background:   '#0d1117',
      foreground:   '#e6edf3',
      cursor:       '#58a6ff',
      selectionBackground: 'rgba(56,139,253,0.35)',
      black:   '#484f58', red:     '#ff7b72', green:  '#3fb950',
      yellow:  '#d29922', blue:    '#58a6ff', magenta:'#bc8cff',
      cyan:    '#39c5cf', white:   '#b1bac4',
      brightBlack:   '#6e7681', brightRed:    '#ffa198',
      brightGreen:   '#56d364', brightYellow: '#e3b341',
      brightBlue:    '#79c0ff', brightMagenta:'#d2a8ff',
      brightCyan:    '#56d4dd', brightWhite:  '#f0f6fc',
    },
    fontFamily: '"Cascadia Code", "Fira Code", "JetBrains Mono", "SF Mono", Consolas, monospace',
    fontSize: 14,
    lineHeight: 1.35,
    cursorBlink: true,
    scrollback: 5000,
    allowProposedApi: true,
  });

  const fitAddon = new FitAddon.FitAddon();
  const linkAddon = new WebLinksAddon.WebLinksAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(linkAddon);
  term.open(document.getElementById('terminal-container'));
  fitAddon.fit();

  const resizeObserver = new ResizeObserver(() => fitAddon.fit());
  resizeObserver.observe(document.getElementById('terminal-container'));

  // ── WebSocket ────────────────────────────────────────────────────
  const proto   = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl   = `${proto}//${location.host}/ws`;
  const dot     = document.getElementById('status-dot');
  const label   = document.getElementById('status-label');
  let ws;

  function setStatus(state, text) {
    dot.className = state;
    label.textContent = text;
  }

  function sendResize() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const buf = new ArrayBuffer(5);
    const v   = new DataView(buf);
    v.setUint8(0, 0x01);
    v.setUint16(1, term.rows, false);
    v.setUint16(3, term.cols, false);
    ws.send(buf);
  }

  function connect() {
    setStatus('connecting', 'connecting…');
    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      setStatus('connected', 'connected');
      sendResize();
    };

    ws.onmessage = (event) => {
      term.write(new Uint8Array(event.data));
    };

    ws.onclose = () => {
      setStatus('unauthenticated', 'disconnected');
      term.writeln('\r\n\x1b[33m[ha-mcp-bridge] Connection closed. Reconnecting in 5 s…\x1b[0m');
      setTimeout(connect, 5000);
    };

    ws.onerror = () => {
      setStatus('unauthenticated', 'error');
    };
  }

  term.onData((data) => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(data);
  });

  term.onResize(() => sendResize());

  // ── Auth status check ────────────────────────────────────────────
  // Show a banner if the user is not signed in so they know to type /login
  async function checkAuth() {
    try {
      const r = await fetch('/auth/status');
      const j = await r.json();
      if (!j.authenticated) {
        document.getElementById('auth-banner').style.display = 'block';
      }
    } catch (_) {}
  }
  checkAuth();

  function dismissBanner() {
    document.getElementById('auth-banner').style.display = 'none';
  }

  // ── Start ────────────────────────────────────────────────────────
  connect();
})();
</script>
</body>
</html>
